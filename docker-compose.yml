services:
  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: top-tutor-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # DATABASE_URL and DIRECT_DATABASE_URL come from .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - top-tutor-network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: top-tutor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-top_tutor_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-top_tutor_db}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - top-tutor-network

  # pgAdmin — optional database GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: top-tutor-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@toptutor.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - top-tutor-network
    profiles:
      - tools

volumes:
  postgres_data:

networks:
  top-tutor-network:
    driver: bridge
