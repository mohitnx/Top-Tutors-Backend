services:
  # PostgreSQL Database for local development
  db:
    image: postgres:16-alpine
    container_name: top-tutor-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: top_tutor_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d top_tutor_db']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for future caching / session / queue use)
  redis:
    image: redis:7-alpine
    container_name: top-tutor-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data

  # pgAdmin — database GUI (open http://localhost:5050, login: admin@toptutor.com / admin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: top-tutor-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@toptutor.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data_dev:
  redis_data_dev:
